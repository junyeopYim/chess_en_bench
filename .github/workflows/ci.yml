name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server,hosted]"

      - name: Tests
        run: pytest -q

      - name: Doctor
        run: ceb doctor

      - name: Public gate (example engine)
        run: ceb gate run --track A --workspace examples/submissions/minimal_uci_engine_python

      - name: Strict gate (example engine)
        run: ceb gate run --track A --workspace examples/submissions/minimal_uci_engine_python --strict --no-match

      - name: Strict gate (C++ example; compiled language policy)
        run: |
          cp -R examples/submissions/minimal_uci_engine_cpp /tmp/cpp_ws
          ceb gate run --track A --workspace /tmp/cpp_ws --strict --no-match

      - name: Anti-cheating scan (example engine)
        run: ceb scan workspace --track A --workspace examples/submissions/minimal_uci_engine_python

      - name: Quick round smoke (prepared workspace, run-id inference)
        run: |
          rm -rf runs/ci_smoke
          ceb workspace prepare --track A --run-id ci_smoke
          cp -R examples/submissions/minimal_uci_engine_python/* runs/ci_smoke/workspace/
          ceb round run --track A --workspace runs/ci_smoke/workspace --round 1 --quick
          test -f runs/ci_smoke/round_1/report.json

      - name: Leaderboard (official + diagnostic)
        run: |
          ceb leaderboard compute --track A --results runs
          ceb leaderboard compute --track A --results runs --include-quick

      - name: Hosted SQLite smoke (diagnostic only; never verified)
        run: |
          rm -rf runs/hosted_ci.sqlite runs/hosted_ci_store
          ceb hosted init --db runs/hosted_ci.sqlite
          ceb hosted submit --track A --workspace examples/submissions/minimal_uci_engine_python --run-id ci_hosted --db runs/hosted_ci.sqlite
          # smoke profile: diagnostic, never verified, never on the leaderboard
          ceb hosted worker run-once --db runs/hosted_ci.sqlite --eval-pack examples/eval_packs/tiny_private --quick-test-mode
          ceb hosted result show --run-id ci_hosted --db runs/hosted_ci.sqlite
          ceb hosted leaderboard --db runs/hosted_ci.sqlite --track A

      - name: Hosted verification guard (official profile refuses without docker jail)
        run: |
          ceb hosted submit --track A --workspace examples/submissions/minimal_uci_engine_python --run-id ci_guard --db runs/hosted_ci.sqlite
          # Must FAIL (exit 2) before evaluating: a verifiable profile needs the docker jail.
          if ceb hosted worker run-once --db runs/hosted_ci.sqlite --eval-pack examples/eval_packs/tiny_private --profile official --engine-jail none; then
            echo "ERROR: official profile produced a result without the engine jail"; exit 1
          fi

      - name: Official readiness check (demo pack -> NOT READY)
        run: |
          # With the committed demo pack and no docker/key this must report NOT
          # READY (nonzero), and the demo_pack_rejected guard must pass.
          ceb hosted readiness check --db runs/hosted_ci.sqlite --eval-pack examples/eval_packs/tiny_private --track A --json > /tmp/readiness.json || true
          python - <<'PY'
          import json
          r = json.load(open("/tmp/readiness.json"))
          checks = {c["name"]: c for c in r["checks"]}
          assert r["ready"] is False, "demo-pack deployment must not be ready"
          assert checks["official_eval_pack_trusted"]["ok"] is False
          assert checks["demo_pack_rejected"]["ok"] is True
          print("readiness check OK (NOT READY as expected; demo pack rejected)")
          PY

      - name: Result signing (Ed25519 keygen + sign + verify)
        run: |
          ceb hosted keygen --private-key /tmp/ceb_priv.pem --public-key /tmp/ceb_pub.pem
          RES=$(find runs/hosted_ci_store -name official_result.json | head -1)
          ceb hosted sign-result --result "$RES" --private-key /tmp/ceb_priv.pem
          ceb hosted verify-result --result "$RES" --public-key /tmp/ceb_pub.pem

      - name: Track B toy round
        run: |
          ceb track-b round run \
            --candidate-engine examples/submissions/minimal_uci_engine_python/engine \
            --baseline-engine BenchRandom --games 2 --movetime 30 --max-plies 20 \
            --runs-dir runs/ci_track_b

      - name: API import
        run: python -c "from ceb.api.main import app; print(app.title)"

      # Docker engine-jail / build-jail / sandbox integration tests are skipped
      # here (no daemon / image in default CI). They cover the VERIFIED official
      # path (Track A + Track B with a trusted official pack, Ed25519 key, and
      # the isolated build jail) and the C++-in-jail build. Run locally with:
      #   bash scripts/build_jail_image.sh   # toolchain image (engine + build jail)
      #   CEB_DOCKER_TESTS=1 pytest tests/test_engine_jail.py \
      #       tests/test_sandbox_docker.py tests/test_track_b_official.py \
      #       tests/test_hosted.py
