# Track A scoring configuration (see docs/scoring.md).

opponent_ratings:
  BenchRandom: 400
  BenchGreedyCapture: 600
  BenchMaterial1: 800
  BenchPST1: 1000
  BenchMiniMax2: 1200
  BenchAlphaBeta3: 1400

# Optional limited-strength anchor engines (P1.3). Anchors are NOT used by
# default and are skipped gracefully when the engine binary is absent, so CI
# and local runs never depend on Stockfish. To enable, add anchor names to a
# round mode's `anchors` list below (e.g. anchors: [SF18_UCI_Elo_1320]).
anchor_opponents:
  SF18_UCI_Elo_1320:
    engine: stockfish
    uci_elo: 1320
    rating: 1320
  SF18_UCI_Elo_1600:
    engine: stockfish
    uci_elo: 1600
    rating: 1600
  SF18_UCI_Elo_1900:
    engine: stockfish
    uci_elo: 1900
    rating: 1900
  SF18_UCI_Elo_2200:
    engine: stockfish
    uci_elo: 2200
    rating: 2200

penalties:                # points subtracted per candidate fault
  illegal_move: 30
  timeout: 15
  crash: 25

round_modes:
  quick:                  # smoke evaluation; does not consume official budget
    opponents: [BenchRandom, BenchMaterial1]
    games_per_opponent: 2
    movetime_ms: 50
    max_plies: 120
    openings_limit: 2     # first N openings of the resolved suite
    anchors: []
  official_round:         # consumes one unit of official round budget; strict gate
    opponents: [BenchRandom, BenchGreedyCapture, BenchMaterial1, BenchPST1, BenchMiniMax2, BenchAlphaBeta3]
    games_per_opponent: 4
    movetime_ms: 200
    max_plies: 200
    openings_limit: 6
    anchors: []
  final_eval:             # leaderboard-quality evaluation; strict gate; no budget cost
    opponents: [BenchRandom, BenchGreedyCapture, BenchMaterial1, BenchPST1, BenchMiniMax2, BenchAlphaBeta3]
    games_per_opponent: 8
    movetime_ms: 200
    max_plies: 200
    openings_limit: 8
    anchors: []
    # Hosted final evals may set anchors plus:
    # anchors_required: true
